services:
  postgres:
    image: postgres:16-alpine
    container_name: mafia-casefile-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mafia_casefile}
      POSTGRES_USER: ${POSTGRES_USER:-mafia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mafia_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mafia} -d ${POSTGRES_DB:-mafia_casefile}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: mafia-casefile-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

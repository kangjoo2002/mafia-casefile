name: API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".dockerignore"
      - ".github/workflows/api-cicd.yml"
      - "deploy/api/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Build shared package
        run: pnpm --filter @mafia-casefile/shared build

      - name: Lint API
        run: pnpm --filter api lint

      - name: Build API
        run: pnpm --filter api build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mafia-casefile-api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

  deploy-api-1:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deployment assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_API_1_HOST }}
          username: ${{ secrets.OCI_API_SSH_USER }}
          key: ${{ secrets.OCI_API_SSH_PRIVATE_KEY }}
          source: "deploy/api/docker-compose.yml,deploy/api/install-or-update-compose.sh"
          target: /tmp/mafia-api-deploy
          strip_components: 2

      - name: Deploy api-1
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: /opt/mafia-api
          GHCR_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: sha-${{ github.sha }}
          API_CONTAINER_NAME: mafia-api-1
          API_PORT: 3001
          SERVER_INSTANCE_ID: api-1
          RUN_MIGRATION: true
          COMPOSE_SOURCE: /tmp/mafia-api-deploy/docker-compose.yml
          SCRIPT_SOURCE: /tmp/mafia-api-deploy/install-or-update-compose.sh
          GHCR_READ_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.OCI_API_1_HOST }}
          username: ${{ secrets.OCI_API_SSH_USER }}
          key: ${{ secrets.OCI_API_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: DEPLOY_DIR,GHCR_OWNER,IMAGE_TAG,API_CONTAINER_NAME,API_PORT,SERVER_INSTANCE_ID,RUN_MIGRATION,COMPOSE_SOURCE,SCRIPT_SOURCE,GHCR_READ_USERNAME,GHCR_READ_TOKEN
          script: |
            chmod +x "$SCRIPT_SOURCE"
            DEPLOY_DIR="$DEPLOY_DIR" \
              GHCR_OWNER="$GHCR_OWNER" \
              IMAGE_TAG="$IMAGE_TAG" \
              API_CONTAINER_NAME="$API_CONTAINER_NAME" \
              API_PORT="$API_PORT" \
              SERVER_INSTANCE_ID="$SERVER_INSTANCE_ID" \
              RUN_MIGRATION="$RUN_MIGRATION" \
              COMPOSE_SOURCE="$COMPOSE_SOURCE" \
              GHCR_READ_USERNAME="$GHCR_READ_USERNAME" \
              GHCR_READ_TOKEN="$GHCR_READ_TOKEN" \
              "$SCRIPT_SOURCE"
            rm -f "$SCRIPT_SOURCE" "$COMPOSE_SOURCE"

  deploy-api-2:
    runs-on: ubuntu-latest
    needs: deploy-api-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deployment assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_API_2_HOST }}
          username: ${{ secrets.OCI_API_SSH_USER }}
          key: ${{ secrets.OCI_API_SSH_PRIVATE_KEY }}
          source: "deploy/api/docker-compose.yml,deploy/api/install-or-update-compose.sh"
          target: /tmp/mafia-api-deploy
          strip_components: 2

      - name: Deploy api-2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: /opt/mafia-api
          GHCR_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: sha-${{ github.sha }}
          API_CONTAINER_NAME: mafia-api-2
          API_PORT: 3001
          SERVER_INSTANCE_ID: api-2
          RUN_MIGRATION: false
          COMPOSE_SOURCE: /tmp/mafia-api-deploy/docker-compose.yml
          SCRIPT_SOURCE: /tmp/mafia-api-deploy/install-or-update-compose.sh
          GHCR_READ_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.OCI_API_2_HOST }}
          username: ${{ secrets.OCI_API_SSH_USER }}
          key: ${{ secrets.OCI_API_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: DEPLOY_DIR,GHCR_OWNER,IMAGE_TAG,API_CONTAINER_NAME,API_PORT,SERVER_INSTANCE_ID,RUN_MIGRATION,COMPOSE_SOURCE,SCRIPT_SOURCE,GHCR_READ_USERNAME,GHCR_READ_TOKEN
          script: |
            chmod +x "$SCRIPT_SOURCE"
            DEPLOY_DIR="$DEPLOY_DIR" \
              GHCR_OWNER="$GHCR_OWNER" \
              IMAGE_TAG="$IMAGE_TAG" \
              API_CONTAINER_NAME="$API_CONTAINER_NAME" \
              API_PORT="$API_PORT" \
              SERVER_INSTANCE_ID="$SERVER_INSTANCE_ID" \
              RUN_MIGRATION="$RUN_MIGRATION" \
              COMPOSE_SOURCE="$COMPOSE_SOURCE" \
              GHCR_READ_USERNAME="$GHCR_READ_USERNAME" \
              GHCR_READ_TOKEN="$GHCR_READ_TOKEN" \
              "$SCRIPT_SOURCE"
            rm -f "$SCRIPT_SOURCE" "$COMPOSE_SOURCE"

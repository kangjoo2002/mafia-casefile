services:
  api:
    image: ghcr.io/${GHCR_OWNER}/mafia-casefile-api:${IMAGE_TAG}
    container_name: ${API_CONTAINER_NAME:-mafia-api}
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PORT: 3001
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
